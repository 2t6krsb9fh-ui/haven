[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# 把请求转发到对应函数
[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/api/history"
  to = "/.netlify/functions/history"
  status = 200

[[redirects]]
  from = "/api/auth"
  to = "/.netlify/functions/auth"
  status = 200

[[redirects]]
  from = "/api/reflection"
  to = "/.netlify/functions/daily-reflection"
  status = 200
